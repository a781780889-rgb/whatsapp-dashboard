name: Build Frontend
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Commit dist
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f frontend/dist
          git diff --staged --quiet || git commit -m "build: auto-build frontend [skip ci]"
          git push
